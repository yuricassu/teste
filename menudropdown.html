<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
    }
      .menu{
          width: 100%;
          height: 50px;
          background-color: #222;
          font-family: arial;
      }     
.menu ul{
    list-style: none;
    position: relative;
}
.menu ul li{
    width: 150px;
    float: left;
}
.menu a{
    padding: 15px;
    display: block;
    text-decoration: none;
    text-align: center;
    background-color: #222;
    color: white;
}
.menu ul ul{
    position: absolute;
    visibility: hidden;
}
.menu ul li:hover ul{
visibility: visible;
}
.menu a:hover{
    background-color: #f4f4f4;
    color: #555;
}
.menu ul ul li{
    float: none;
    border-bottom: solid 1px #ccc;
    
}
.menu ul ul li a{
    background-color: #069;
}
label[for="bt_menu"]{
    padding: 5px;
    background-color:  #222;
    color: #fff;
    font-family: arial;
    text-align: center;
    font-size: 30px;
    cursor: pointer;
    width: 50px;
    height: 50px;
    display: none;
}
input{
    display: none;

}
@media(max-width: 800px){
    label[for="bt_menu"]{
        display: block;
    }
    .menu ul li{
        width: 100%;
        float: none;
    }
    .menu ul ul{
        position: static;
        overflow: hidden;
        max-height: 0;
        transition: all .4s;
    }

    .menu ul li:hover ul{
        height: auto;
        max-height: 200px;
    }
    #bt_menu{
        display: none;
    }
    .menu{
        margin-top: 5px;
        margin-left: -100%;
        transition: all .4s;
    }
    #bt_menu:checked ~ .menu{
        margin-left: 0;
    }
}


</style>

<body>
<input type="checkbox" id="bt_menu">
<label for="bt_menu">&#9776;</label>
    <nav class="menu">
    <ul>
        <li><a href=""> home</a></li>
        <li><a href=""> serviços </a>
        <ul>
            <li><a href=""> criaçao de site</a></li>
            <li><a href=""> arte visual</a></li>
        </ul></li>
        <li><a href=""> cursos</a> 
            <ul>
                <li><a href=""> java</a></li>
                <li><a href=""> html</a></li>
                <li><a href=""> css</a></li>
            </ul></li>
        <li><a href=""> contato </a></li>
       
    </ul>
</nav>
</body>
</html>
